[workspace]
members = [
    "crates/server",
    "crates/worker",
    "crates/auth",
    "crates/game_core",
    "crates/trpg_rules",
    "crates/rule_system_generic_percentile",
    "crates/rule_system_dnd5e_srd",
    "crates/rule_system_commercial_adapter",
    "crates/dice_engine",
    "crates/rag_core",
    "crates/document_ingestor",
    "crates/llm_client",
    "crates/media_provider",
    "crates/agent_core",
    "crates/dice_agent",
    "crates/character_agent",
    "crates/kp_agent",
    "crates/creator_agent",
    "crates/memory_core",
    "crates/export_core",
    "crates/storage",
    "crates/observability",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "AGPL-3.0-or-later"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1.0.102"
async-trait = "0.1.89"
axum = { version = "0.8.7", features = ["json", "tokio"] }
base64 = "0.22.1"
hmac = "0.12.1"
http = "1.3.1"
schemars = { version = "1.1.0", features = ["uuid1"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
sha2 = "0.10.9"
sqlx = { version = "0.9.0", default-features = false, features = ["runtime-tokio", "tls-native-tls", "postgres", "uuid", "json", "migrate", "macros"] }
thiserror = "2.0.18"
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread", "signal"] }
toml = "0.9.9"
tower = { version = "0.5.2", features = ["util"] }
uuid = { version = "1.19.0", features = ["serde", "v4"] }
