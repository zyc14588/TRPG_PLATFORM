name: coc-ai-trpg-s09

services:
  web:
    image: nginx:alpine
    labels:
      coc_ai_trpg.placeholder: "true"
    command: ["sh", "-c", "printf '{\"status\":\"not_implemented\",\"placeholder\":true}\n' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6

  api:
    image: nginx:alpine
    labels:
      coc_ai_trpg.placeholder: "true"
    ports:
      - "8080:80"
    command: ["sh", "-c", "printf '{\"status\":\"not_implemented\",\"placeholder\":true,\"service\":\"api\"}\n' > /usr/share/nginx/html/healthz && nginx -g 'daemon off;'"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6

  realtime:
    image: nginx:alpine
    labels:
      coc_ai_trpg.placeholder: "true"
    command: ["sh", "-c", "printf '{\"status\":\"not_implemented\",\"placeholder\":true}\n' > /usr/share/nginx/html/healthz && nginx -g 'daemon off;'"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6

  agent-worker:
    image: nginx:alpine
    labels:
      coc_ai_trpg.placeholder: "true"
    command: ["sh", "-c", "printf '{\"status\":\"not_implemented\",\"placeholder\":true}\n' > /usr/share/nginx/html/healthz && nginx -g 'daemon off;'"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coc_ai_trpg
      POSTGRES_PASSWORD: coc_ai_trpg
      POSTGRES_USER: coc_ai_trpg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coc_ai_trpg -d coc_ai_trpg"]
      interval: 10s
      timeout: 3s
      retries: 6

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_ROOT_USER: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 6

  reverse-proxy:
    image: nginx:alpine
    labels:
      coc_ai_trpg.placeholder: "true"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6

  admin:
    image: nginx:alpine
    labels:
      coc_ai_trpg.placeholder: "true"
    command: ["sh", "-c", "printf '{\"status\":\"not_implemented\",\"placeholder\":true}\n' > /usr/share/nginx/html/healthz && nginx -g 'daemon off;'"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 6
