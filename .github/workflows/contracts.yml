name: repository-truth

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: repository-truth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  truth:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.6"
      - name: Repository validators
        run: |
          python3 scripts/ci/validate_workflows.py
          python3 scripts/ci/verify_test_inventory.py --report "$RUNNER_TEMP/test-inventory.json"
          python3 scripts/ci/verify_manifest.py
          python3 scripts/ci/verify_evidence_schema.py
      - name: Shell syntax
        run: |
          bash -n scripts/ci/init-smoke.sh
          bash -n scripts/backup_restore/smoke.sh
          bash -n scripts/projection_rebuild/verify.sh
      - name: actionlint 1.7.7
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          "$(go env GOPATH)/bin/actionlint" .github/workflows/*.yml
      - name: ShellCheck 0.10.0
        run: |
          curl -fsSLo "$RUNNER_TEMP/shellcheck.tar.xz" https://github.com/koalaman/shellcheck/releases/download/v0.10.0/shellcheck-v0.10.0.linux.x86_64.tar.xz
          tar -xJf "$RUNNER_TEMP/shellcheck.tar.xz" -C "$RUNNER_TEMP"
          "$RUNNER_TEMP/shellcheck-v0.10.0/shellcheck" scripts/ci/*.sh scripts/backup_restore/*.sh scripts/projection_rebuild/*.sh
      - name: Runtime evidence
        run: |
          python3 scripts/ci/generate_evidence.py --report "$RUNNER_TEMP/repository-truth.json" --command "repository truth checks" --exit-code 0 --status PASS --artifact MANIFEST.md
          python3 scripts/ci/verify_evidence_schema.py "$RUNNER_TEMP/repository-truth.json"
