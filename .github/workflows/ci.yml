name: workspace-ci

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: workspace-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace:
    name: workspace-ci / workspace
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.6"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Pin pnpm
        run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Start and bootstrap pinned P02 policy services
        run: |
          docker run -d --name p02-postgres \
            -e POSTGRES_HOST_AUTH_METHOD=trust \
            -e POSTGRES_DB=p02_identity \
            -p 127.0.0.1:15432:5432 \
            postgres@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
          docker run -d --name p02-openfga \
            -p 127.0.0.1:18080:8080 \
            openfga/openfga@sha256:8543200bf85878c968d73da46c4f0e31ba1f63ed3675b71122f1133b0e9d97eb \
            run --datastore-engine memory --playground-enabled=false
          docker run -d --name p02-opa \
            -p 127.0.0.1:18082:8181 \
            -v "$GITHUB_WORKSPACE/policy/opa:/policy:ro" \
            openpolicyagent/opa@sha256:cba27d3c6af2feba1e4d6e6b5e24df5b53db332420d4148a90acccd12efae6ed \
            run --server --addr=0.0.0.0:8181 /policy
          python3 scripts/ci/p02_policy_bootstrap.py --github-env "$GITHUB_ENV"
      - name: Full CI with evidence
        run: |
          mkdir -p "$RUNNER_TEMP/workspace-ci"
          python3 scripts/ci/generate_evidence.py --report "$RUNNER_TEMP/workspace-ci/evidence-manifest.json" --artifact MANIFEST.md -- bash scripts/ci/test-all.sh
          python3 scripts/ci/verify_evidence_schema.py --live-context "$RUNNER_TEMP/workspace-ci/evidence-manifest.json"
      - name: Upload workspace evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: workspace-ci-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/workspace-ci
          if-no-files-found: error
          retention-days: 30
