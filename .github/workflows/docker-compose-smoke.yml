name: docker-compose-config

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - .github/workflows/docker-compose-smoke.yml
      - scripts/ci/**
      - compose.yml
      - docker-compose.ci.yml

permissions:
  contents: read

concurrency:
  group: docker-compose-config-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.6"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Pin pnpm
        run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - name: Validate Compose configuration only
        run: |
          mkdir -p "$RUNNER_TEMP/docker-compose-config"
          python3 scripts/ci/generate_evidence.py --report "$RUNNER_TEMP/docker-compose-config/evidence-manifest.json" --artifact MANIFEST.md -- bash -c 'docker compose -f compose.yml config && docker compose -f docker-compose.ci.yml config'
          python3 scripts/ci/verify_evidence_schema.py "$RUNNER_TEMP/docker-compose-config/evidence-manifest.json"
      - name: Upload Compose config evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-compose-config-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/docker-compose-config
          if-no-files-found: error
          retention-days: 30
