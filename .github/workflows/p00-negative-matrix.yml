name: p00-negative-matrix

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - .github/workflows/p00-negative-matrix.yml
      - scripts/ci/**
      - P00_REMOTE_CANONICALIZATION_DECISION.md

permissions:
  contents: read

concurrency:
  group: p00-negative-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  controlled-failure:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        case:
          - CASE-01_broken_test_assertion
          - CASE-02_missing_referenced_script
          - CASE-03_missing_required_evidence
          - CASE-04_manifest_hash_tamper
          - CASE-05_readiness_provenance_removed
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.6"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Pin pnpm
        run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - name: Prove controlled failure propagation
        run: |
          case_dir="$RUNNER_TEMP/p00-negative/${{ matrix.case }}"
          mkdir -p "$case_dir"
          python3 scripts/ci/generate_evidence.py \
            --report "$case_dir/evidence-manifest.json" \
            --artifact MANIFEST.md \
            --generated-artifact "$case_dir/baseline-output.txt" \
            --generated-artifact "$case_dir/validation-output.txt" \
            --generated-artifact "$case_dir/fault.diff" \
            --generated-artifact "$case_dir/exit-code.txt" \
            --generated-artifact "$case_dir/sha256.txt" \
            -- python3 scripts/ci/p00_negative_case.py --case "${{ matrix.case }}" --output-dir "$case_dir"
          python3 scripts/ci/verify_evidence_schema.py --live-context "$case_dir/evidence-manifest.json"
      - name: Upload controlled negative evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: p00-negative-${{ matrix.case }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/p00-negative/${{ matrix.case }}
          if-no-files-found: error
          retention-days: 30
