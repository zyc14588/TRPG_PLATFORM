name: golden-scenarios

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: golden-scenarios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Golden scenarios
        run: cargo test -p trpg-testing --test golden_scenarios_ci --all-features --locked
      - name: Model certification
        run: cargo test -p trpg-testing --test model_certification_tests --all-features --locked
      - name: Visibility leakage
        run: cargo test -p trpg-testing --test visibility_leakage --all-features --locked
