name: golden-scenarios

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: golden-scenarios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden:
    name: golden-scenarios / golden
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.6"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Pin pnpm
        run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - name: Golden gates with evidence
        run: |
          mkdir -p "$RUNNER_TEMP/golden-scenarios"
          python3 scripts/ci/generate_evidence.py --report "$RUNNER_TEMP/golden-scenarios/evidence-manifest.json" --artifact MANIFEST.md -- bash -c 'cargo test -p trpg-testing --test golden_scenarios_ci --all-features --locked && cargo test -p trpg-testing --test model_certification_tests --all-features --locked && cargo test -p trpg-testing --test visibility_leakage --all-features --locked'
          python3 scripts/ci/verify_evidence_schema.py --live-context "$RUNNER_TEMP/golden-scenarios/evidence-manifest.json"
      - name: Upload golden evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: golden-scenarios-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/golden-scenarios
          if-no-files-found: error
          retention-days: 30
